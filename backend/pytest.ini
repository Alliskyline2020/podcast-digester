[pytest]
# pytest配置文件

# 测试发现模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = tests

# asyncio配置
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# 输出配置
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    database: 数据库相关测试
    api: API相关测试
    llm: LLM相关测试（需要API key）

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆盖率配置
# 覆盖率默认不在 addopts（避免 TDD 聚焦跑单文件时被 fail-under 误杀、且每次都全量计 cov）。
# - 本地看覆盖：pytest --cov=app --cov-report=term-missing
# - CI 闸门：见 .github/workflows/ci.yml，实测约 50%，--cov-fail-under=45 为防回退底线，
#   目标 80%（见 testing 规则），覆盖率提升后逐步上调。
