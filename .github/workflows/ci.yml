name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 同一分支的新推送取消上一条正在跑的 CI，省额度
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install ffmpeg
        # asr_afm3 的 ffprobe 探测会用到；缺失时代码会优雅降级，但装上更稳。
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        # 覆盖率闸门只在 CI 强制（本地默认不挂 --cov，便于 TDD 聚焦跑单文件）。
        # 实测约 50%；fail-under=45 为防回退底线，目标 80%，逐步上调。
        run: python -m pytest -q --cov=app --cov-report=term-missing --cov-fail-under=45

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test:run

      - name: Build smoke
        # 验证前端能编译通过（类型/导入/打包无误）
        run: npm run build
