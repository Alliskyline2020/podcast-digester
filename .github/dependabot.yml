version: 2
updates:
  # 前端 npm 依赖
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      vue:
        patterns: ["vue", "@vitejs/*", "vite", "vitest"]

  # 后端 pip 依赖
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  # GitHub Actions 版本
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
